<head>
  <meta charset="UTF-8">
  <link href="http://gmpg.org/xfn/11" rel="profile">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("theme");
        if (theme === "light" || theme === "dark") {
          document.documentElement.setAttribute("data-theme", theme);
        }
      } catch (_) {
      }
    }());
  </script>
  <style>
    [data-theme-toggle] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      margin-left: .75rem;
      padding: .125rem;
      vertical-align: -.25rem;
      color: var(--color-faint, #c0c0c0);
      background: transparent;
      border: 0;
      border-radius: 999px;
      appearance: none;
      cursor: pointer;
    }

    [data-theme-toggle]:hover,
    [data-theme-toggle]:focus {
      color: var(--color-link, #0366d6);
    }

    [data-theme-toggle] svg {
      display: block;
      width: 1.25rem;
      height: 1.25rem;
    }

    [data-theme-toggle] svg[hidden] {
      display: none !important;
    }
  </style>
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Icons -->
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ '/public/apple-touch-icon-precomposed.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ '/index.xml' | relative_url }}" />
  <script defer src="{{ '/public/theme-toggle.js' | relative_url }}"></script>

</head>
