<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">2 by 2 systolic array</title>
  <desc id="desc">A diagram showing two input lanes feeding a 2 by 2 grid of multiply-accumulate units, with B values chaining through local registers and outputs flowing separately to a bottom register bank.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="7.5" markerHeight="6" refX="6.75" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7.5,3 L0,6 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#f97316" />
    </marker>
    <marker id="arrow-green" markerWidth="7.5" markerHeight="6" refX="6.75" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7.5,3 L0,6 z" fill="#16a34a" />
    </marker>
    <style>
      .label { fill: #111827; font: 600 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .small { fill: #374151; font: 14px system-ui, -apple-system, Segoe UI, sans-serif; }
      .tiny { fill: #4b5563; font: 12px system-ui, -apple-system, Segoe UI, sans-serif; }
      .bank { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .output-bank { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .mac { fill: #ffffff; stroke: #111827; stroke-width: 2.5; rx: 14; }
      .reg { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 6; }
      .lane-blue { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); }
      .lane-orange { fill: none; stroke: #f97316; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-orange); }
      .lane-green { fill: none; stroke: #16a34a; stroke-width: 4; marker-end: url(#arrow-green); }
      .thin-gray { fill: none; stroke: #9ca3af; stroke-width: 2; }
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="698" fill="#ffffff" stroke="#e5e7eb" />

  <text x="56" y="355" text-anchor="middle" class="label">A inputs</text>
  <rect x="75" y="250" width="85" height="42" fill="#dbeafe" stroke="#2563eb" rx="8" />
  <text x="117" y="277" text-anchor="middle" class="label">A0</text>
  <rect x="75" y="409" width="85" height="42" fill="#dbeafe" stroke="#2563eb" rx="8" />
  <text x="117" y="436" text-anchor="middle" class="label">A1</text>

  <text x="528" y="96" text-anchor="middle" class="label">B inputs (slow)</text>

  <rect x="300" y="225" width="150" height="100" class="mac" />
  <rect x="402" y="238" width="36" height="32" class="reg" />
  <text x="420" y="258" text-anchor="middle" class="tiny">B00</text>
  <text x="375" y="292" text-anchor="middle" class="label">MAC</text>
  <text x="375" y="315" text-anchor="middle" class="tiny">R += A0 x B00</text>

  <rect x="515" y="225" width="150" height="100" class="mac" />
  <rect x="617" y="238" width="36" height="32" class="reg" />
  <text x="635" y="258" text-anchor="middle" class="tiny">B01</text>
  <text x="590" y="292" text-anchor="middle" class="label">MAC</text>
  <text x="590" y="315" text-anchor="middle" class="tiny">R += A0 x B01</text>

  <rect x="300" y="380" width="150" height="100" class="mac" />
  <rect x="402" y="393" width="36" height="32" class="reg" />
  <text x="420" y="413" text-anchor="middle" class="tiny">B10</text>
  <text x="375" y="447" text-anchor="middle" class="label">MAC</text>
  <text x="375" y="470" text-anchor="middle" class="tiny">R += A1 x B10</text>

  <rect x="515" y="380" width="150" height="100" class="mac" />
  <rect x="617" y="393" width="36" height="32" class="reg" />
  <text x="635" y="413" text-anchor="middle" class="tiny">B11</text>
  <text x="590" y="447" text-anchor="middle" class="label">MAC</text>
  <text x="590" y="470" text-anchor="middle" class="tiny">R += A1 x B11</text>

  <line x1="160" y1="271" x2="300" y2="271" class="lane-blue" />
  <line x1="450" y1="271" x2="515" y2="271" class="lane-blue" />

  <line x1="160" y1="430" x2="300" y2="430" class="lane-blue" />
  <line x1="450" y1="430" x2="515" y2="430" class="lane-blue" />

  <text x="375" y="172" text-anchor="middle" class="label">0</text>
  <text x="590" y="172" text-anchor="middle" class="label">0</text>
  <path d="M375,180 L375,225" class="lane-green" />
  <path d="M590,180 L590,225" class="lane-green" />
  <path d="M375,325 L375,380" class="lane-green" />
  <path d="M590,325 L590,380" class="lane-green" />
  <path d="M375,480 L375,573" class="lane-green" />
  <path d="M590,480 L590,573" class="lane-green" />

  <path d="M420,98 L420,238" class="lane-orange" />
  <path d="M420,270 L420,393" class="lane-orange" />
  <path d="M635,98 L635,238" class="lane-orange" />
  <path d="M635,270 L635,393" class="lane-orange" />

  <rect x="335" y="573" width="80" height="42" class="output-bank" />
  <text x="375" y="600" text-anchor="middle" class="label">R0</text>
  <rect x="550" y="573" width="80" height="42" class="output-bank" />
  <text x="590" y="600" text-anchor="middle" class="label">R1</text>

</svg>
